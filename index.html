<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>시간 트래커</title>
<style>
  @import url('https://fonts.googleapis.com/css2?family=DM+Sans:wght@400;500;600&family=DM+Mono:wght@400;500&display=swap');
  *,*::before,*::after{box-sizing:border-box;margin:0;padding:0}
  :root{--bg:#f7f6f2;--surface:#fff;--border:#e4e2db;--text:#1a1917;--muted:#888580;--accent:#1D9E75;--radius:10px;--font:'DM Sans',sans-serif;--mono:'DM Mono',monospace}
  body{font-family:var(--font);background:var(--bg);color:var(--text);min-height:100vh;font-size:14px}
  .shell{display:flex;min-height:100vh}
  .sidebar{width:220px;flex-shrink:0;border-right:1px solid var(--border);background:var(--surface);padding:1.5rem 1rem;display:flex;flex-direction:column}
  .sidebar-logo{font-size:15px;font-weight:600;letter-spacing:-.03em;margin-bottom:1.5rem;display:flex;align-items:center;gap:7px}
  .sidebar-section{font-size:10px;font-weight:600;letter-spacing:.08em;text-transform:uppercase;color:var(--muted);margin:1rem 0 .4rem}
  .user-item{display:flex;align-items:center;gap:8px;padding:7px 9px;border-radius:8px;cursor:pointer;transition:background .12s;font-size:13px}
  .user-item:hover,.user-item.active{background:var(--bg)}
  .user-item.active{font-weight:500}
  .avatar{width:26px;height:26px;border-radius:50%;font-size:10px;font-weight:600;display:flex;align-items:center;justify-content:center;flex-shrink:0}
  .main{flex:1;overflow:auto;padding:2rem;max-width:800px}
  .onboard-wrap{display:flex;align-items:center;justify-content:center;min-height:100vh;padding:2rem}
  .onboard-card{background:var(--surface);border:1px solid var(--border);border-radius:16px;padding:2.5rem;max-width:400px;width:100%;text-align:center}
  .onboard-card h1{font-size:22px;font-weight:600;letter-spacing:-.03em;margin-bottom:.5rem}
  .onboard-card p{color:var(--muted);font-size:13px;margin-bottom:1.5rem;line-height:1.6}
  .onboard-row{display:flex;gap:8px}
  input[type=text]{flex:1;height:40px;padding:0 14px;font-size:14px;font-family:var(--font);border:1px solid var(--border);border-radius:8px;background:var(--bg);color:var(--text);outline:none;transition:border-color .15s;width:100%}
  input[type=text]:focus{border-color:var(--accent)}
  input[type=text]::placeholder{color:var(--muted)}
  .btn{height:40px;padding:0 18px;font-size:14px;font-family:var(--font);font-weight:500;border-radius:8px;border:1px solid var(--border);background:var(--surface);color:var(--text);cursor:pointer;transition:all .15s;white-space:nowrap}
  .btn:hover{background:var(--bg)}
  .btn:active{transform:scale(0.98)}
  .btn:disabled{opacity:.35;cursor:default;transform:none}
  .btn.green{background:var(--accent);color:#fff;border-color:var(--accent)}
  .btn.green:hover{background:#178a64}
  .page-hd{display:flex;align-items:center;justify-content:space-between;margin-bottom:1.5rem;padding-bottom:1rem;border-bottom:1.5px solid var(--text)}
  .page-hd h2{font-size:20px;font-weight:600;letter-spacing:-.03em}
  .page-hd .sub{font-family:var(--mono);font-size:12px;color:var(--muted)}
  .tracker-box{background:var(--surface);border:1px solid var(--border);border-radius:var(--radius);padding:1.25rem;margin-bottom:1.25rem}
  .tracker-row{display:flex;gap:8px}
  .status-row{display:flex;align-items:center;gap:8px;margin-top:10px;font-size:12px;color:var(--muted)}
  .dot{width:7px;height:7px;border-radius:50%;background:var(--border);flex-shrink:0}
  .dot.on{background:var(--accent);animation:blink 1.4s infinite}
  @keyframes blink{0%,100%{opacity:1}50%{opacity:.35}}
  .metrics{display:grid;grid-template-columns:repeat(3,1fr);gap:10px;margin-bottom:1.25rem}
  .metric{background:var(--surface);border:1px solid var(--border);border-radius:var(--radius);padding:14px 16px}
  .m-label{font-size:10px;font-weight:600;letter-spacing:.06em;text-transform:uppercase;color:var(--muted);margin-bottom:6px}
  .m-val{font-size:20px;font-weight:600;letter-spacing:-.02em}
  .card{background:var(--surface);border:1px solid var(--border);border-radius:var(--radius);margin-bottom:1.25rem;overflow:hidden}
  .card-hd{display:flex;justify-content:space-between;align-items:center;padding:11px 16px;border-bottom:1px solid var(--border);font-size:11px;font-weight:600;letter-spacing:.06em;text-transform:uppercase;color:var(--muted);background:var(--bg)}
  table{width:100%;border-collapse:collapse;font-size:13px}
  th{padding:9px 14px;text-align:left;font-size:10px;font-weight:600;letter-spacing:.06em;text-transform:uppercase;color:var(--muted);border-bottom:1px solid var(--border)}
  td{padding:9px 14px;border-bottom:1px solid var(--border)}
  tr:last-child td{border-bottom:none}
  tr:hover td{background:#fafaf8}
  .bar-section{padding:14px 16px}
  .bar-row{display:flex;align-items:center;gap:10px;margin-bottom:7px}
  .bl{width:100px;text-align:right;font-size:12px;color:var(--muted);overflow:hidden;text-overflow:ellipsis;white-space:nowrap}
  .bw{flex:1;background:var(--bg);border-radius:20px;height:15px;overflow:hidden}
  .bf{height:100%;border-radius:20px;transition:width .5s ease}
  .bt{width:52px;font-size:11px;color:var(--muted);font-family:var(--mono)}
  .tag{display:inline-block;padding:2px 9px;border-radius:20px;font-size:11px;font-weight:500;font-family:var(--mono)}
  .empty{text-align:center;color:var(--muted);font-size:13px;padding:2rem}
  .del-btn{background:none;border:none;cursor:pointer;color:var(--muted);padding:2px 6px;border-radius:4px;font-size:15px;transition:all .12s}
  .del-btn:hover{color:#c0392b;background:#fdf0ef}
  .sm-btn{height:28px;padding:0 12px;font-size:11px;font-family:var(--font);font-weight:500;border-radius:6px;border:1px solid var(--border);background:var(--surface);color:var(--muted);cursor:pointer}
  .sm-btn:hover{background:var(--bg)}
  .badge-me{font-size:10px;background:#E1F5EE;color:#085041;padding:1px 6px;border-radius:20px;margin-left:4px;font-weight:500}
  @media(max-width:600px){.sidebar{display:none}.main{padding:1rem}.metrics{grid-template-columns:1fr 1fr}}
</style>
</head>
<body>
<div id="onboardWrap" class="onboard-wrap">
  <div class="onboard-card">
    <h1>⏱ 시간 트래커</h1>
    <p>이름을 입력하면 나만의 트래커가 만들어집니다.<br>다른 사람의 기록도 함께 볼 수 있어요.</p>
    <div class="onboard-row">
      <input type="text" id="nameInput" placeholder="이름 입력" maxlength="20"/>
      <button class="btn green" onclick="login()">시작</button>
    </div>
  </div>
</div>
<div id="appShell" class="shell" style="display:none">
  <aside class="sidebar">
    <div class="sidebar-logo">⏱ 트래커</div>
    <div id="myUserItem" class="user-item active" onclick="showMyView()">
      <div class="avatar" id="sideAvatar"></div>
      <span id="sideMyName"></span>
      <span class="badge-me">나</span>
    </div>
    <div class="sidebar-section">참여자</div>
    <div id="sideUserList"><div style="color:var(--muted);font-size:12px;padding:4px 9px">불러오는 중...</div></div>
    <div style="margin-top:auto;padding-top:1rem;border-top:1px solid var(--border)">
      <button class="sm-btn" style="width:100%" onclick="logout()">로그아웃</button>
    </div>
  </aside>
  <main class="main">
    <div id="myView">
      <div class="page-hd">
        <h2 id="pageTitle">내 트래커</h2>
        <span class="sub" id="pageDate"></span>
      </div>
      <div class="tracker-box">
        <div class="tracker-row">
          <input type="text" id="ti" placeholder="작업명 입력 (예: 보고서 작성)"/>
          <button class="btn green" id="sb" onclick="startTask()">시작</button>
          <button class="btn" id="eb" onclick="stopTask()" disabled>종료</button>
        </div>
        <div class="status-row">
          <div class="dot" id="dot"></div>
          <span id="st">작업명을 입력하고 시작 버튼을 누르세요.</span>
        </div>
      </div>
      <div class="metrics">
        <div class="metric"><div class="m-label">총 작업 시간</div><div class="m-val" id="mt">—</div></div>
        <div class="metric"><div class="m-label">완료 작업</div><div class="m-val" id="mc">—</div></div>
        <div class="metric"><div class="m-label">최다 작업</div><div class="m-val" id="mx" style="font-size:13px;padding-top:4px">—</div></div>
      </div>
      <div class="card">
        <div class="card-hd">작업 분포 (오늘)</div>
        <div class="bar-section" id="myBars"><div class="empty">기록이 쌓이면 나타납니다.</div></div>
      </div>
      <div class="card">
        <div class="card-hd"><span>기록</span><button class="sm-btn" onclick="refreshMyRecords()">↻ 새로고침</button></div>
        <table>
          <thead><tr><th>작업명</th><th>날짜</th><th>시작</th><th>종료</th><th>시간</th><th></th></tr></thead>
          <tbody id="myLog"><tr><td colspan="6" class="empty">아직 기록이 없습니다.</td></tr></tbody>
        </table>
      </div>
    </div>
    <div id="otherView" style="display:none">
      <div class="page-hd"><h2 id="otherTitle"></h2></div>
      <div class="metrics">
        <div class="metric"><div class="m-label">오늘 총 시간</div><div class="m-val" id="oMt">—</div></div>
        <div class="metric"><div class="m-label">완료 작업</div><div class="m-val" id="oMc">—</div></div>
        <div class="metric"><div class="m-label">최다 작업</div><div class="m-val" id="oMx" style="font-size:13px;padding-top:4px">—</div></div>
      </div>
      <div class="card">
        <div class="card-hd">작업 분포 (오늘)</div>
        <div class="bar-section" id="oBars"><div class="empty">불러오는 중...</div></div>
      </div>
      <div class="card">
        <div class="card-hd">전체 기록 (읽기 전용)</div>
        <table>
          <thead><tr><th>작업명</th><th>날짜</th><th>시작</th><th>종료</th><th>시간</th></tr></thead>
          <tbody id="otherLog"><tr><td colspan="5" class="empty">불러오는 중...</td></tr></tbody>
        </table>
      </div>
    </div>
  </main>
</div>
<script>
const APPS_SCRIPT_URL="https://script.google.com/macros/s/AKfycbzMlTeqDP6VoXhkyqqSg56uvC16DMfSmugUi64ONAG5STU4jELvo0gjSEzkj2Tf5lQYEQ/exec";
const COLORS=['#1D9E75','#378ADD','#D85A30','#7F77DD','#D4537E','#639922','#BA7517','#3C3489'];
const AV_BG=['#E1F5EE','#E6F1FB','#FAECE7','#FBEAF0','#EAF3DE','#FAEEDA','#F1EFE8'];
const AV_FG=['#085041','#0C447C','#712B13','#72243E','#27500A','#633806','#444441'];
let myName=null,myRecords=[],current=null,timerInterval=null;
function pad(n){return String(n).padStart(2,'0')}
function fmtT(d){return pad(d.getHours())+':'+pad(d.getMinutes())+':'+pad(d.getSeconds())}
function fmtD(d){return d.getFullYear()+'-'+pad(d.getMonth()+1)+'-'+pad(d.getDate())}
function today(){return fmtD(new Date())}
function minStr(ms){const m=Math.floor(ms/60000),h=Math.floor(m/60);return h>0?h+'시간 '+(m%60)+'분':m+'분'}
function colorFor(n){let h=0;for(let c of n)h=(h*31+c.charCodeAt(0))%COLORS.length;return COLORS[h]}
function avIdx(n){let h=0;for(let c of n)h=(h*31+c.charCodeAt(0))%AV_BG.length;return h}
function initials(n){return n.slice(0,2).toUpperCase()}
function uuid(){return 'xxxxxxxx-xxxx-4xxx-yxxx-xxxxxxxxxxxx'.replace(/[xy]/g,c=>{const r=Math.random()*16|0;return(c=='x'?r:(r&0x3|0x8)).toString(16)})}
async function api(params){
  const url=APPS_SCRIPT_URL+'?'+new URLSearchParams(params);
  const r=await fetch(url,{redirect:'follow'});
  return r.json();
}
function login(){
  const name=document.getElementById('nameInput').value.trim();
  if(!name)return;
  myName=name;
  localStorage.setItem('tt_name',name);
  document.getElementById('onboardWrap').style.display='none';
  document.getElementById('appShell').style.display='flex';
  const idx=avIdx(name);
  document.getElementById('sideMyName').textContent=name;
  const av=document.getElementById('sideAvatar');
  av.textContent=initials(name);
  av.style.background=AV_BG[idx];
  av.style.color=AV_FG[idx];
  document.getElementById('pageTitle').textContent=name+'의 트래커';
  document.getElementById('pageDate').textContent=new Date().toLocaleDateString('ko-KR',{year:'numeric',month:'long',day:'numeric',weekday:'short'});
  refreshMyRecords();
  loadSideUsers();
}
function logout(){
  if(current)stopTask();
  myName=null;myRecords=[];
  localStorage.removeItem('tt_name');
  document.getElementById('appShell').style.display='none';
  document.getElementById('onboardWrap').style.display='flex';
  document.getElementById('nameInput').value='';
}
function startTask(){
  const name=document.getElementById('ti').value.trim();
  if(!name){document.getElementById('ti').focus();return}
  if(current)stopTask();
  const now=new Date();
  current={id:uuid(),name,date:fmtD(now),start:fmtT(now),startMs:now.getTime()};
  api({action:'addRecord',id:current.id,user:myName,task:name,date:current.date,start:current.start,end:'',duration_ms:''});
  myRecords.unshift({id:current.id,name:current.name,date:current.date,start:current.start,end:null,durationMs:0});
  document.getElementById('ti').value='';
  document.getElementById('sb').disabled=true;
  document.getElementById('eb').disabled=false;
  document.getElementById('dot').classList.add('on');
  clearInterval(timerInterval);
  timerInterval=setInterval(()=>{
    document.getElementById('st').textContent='"'+current.name+'" 진행 중 — '+minStr(Date.now()-current.startMs);
    myRecords[0].durationMs=Date.now()-current.startMs;
    renderMy();
  },5000);
  document.getElementById('st').textContent='"'+name+'" 시작됨';
  renderMy();
}
async function stopTask(){
  if(!current)return;
  clearInterval(timerInterval);
  const now=new Date();
  const endTime=fmtT(now);
  const durationMs=now.getTime()-current.startMs;
  await api({action:'updateRecord',id:current.id,end:endTime,duration_ms:durationMs});
  myRecords[0]={...current,end:endTime,durationMs};
  current=null;
  document.getElementById('sb').disabled=false;
  document.getElementById('eb').disabled=true;
  document.getElementById('dot').classList.remove('on');
  document.getElementById('st').textContent='"'+myRecords[0].name+'" 완료 — '+minStr(myRecords[0].durationMs);
  renderMy();
}
async function deleteRecord(idx,id){
  if(!confirm('이 기록을 삭제할까요?'))return;
  await api({action:'deleteRecord',id});
  myRecords.splice(idx,1);
  renderMy();
}
async function refreshMyRecords(){
  const data=await api({action:'getRecords',user:myName});
  if(data&&data.records){
    myRecords=data.records.map(r=>({id:r.id,name:r.task,date:r.date,start:r.start,end:r.end||null,durationMs:Number(r.duration_ms)||0}));
  }
  renderMy();
}
function renderMy(){
  const done=myRecords.filter(r=>r.date===today()&&r.end);
  const totalMs=done.reduce((s,r)=>s+r.durationMs,0);
  document.getElementById('mt').textContent=done.length?minStr(totalMs):'—';
  document.getElementById('mc').textContent=done.length?done.length+'개':'—';
  const byTask={};
  done.forEach(r=>{byTask[r.name]=(byTask[r.name]||0)+r.durationMs});
  const sorted=Object.entries(byTask).sort((a,b)=>b[1]-a[1]);
  document.getElementById('mx').textContent=sorted.length?sorted[0][0]:'—';
  const bars=document.getElementById('myBars');
  if(!sorted.length){bars.innerHTML='<div class="empty">기록이 쌓이면 나타납니다.</div>';}
  else{const max=sorted[0][1];bars.innerHTML=sorted.map(([n,ms])=>'<div class="bar-row"><div class="bl" title="'+n+'">'+n+'</div><div class="bw"><div class="bf" style="width:'+Math.round(ms/max*100)+'%;background:'+colorFor(n)+'"></div></div><div class="bt">'+minStr(ms)+'</div></div>').join('')}
  const log=document.getElementById('myLog');
  if(!myRecords.length){log.innerHTML='<tr><td colspan="6" class="empty">아직 기록이 없습니다.</td></tr>';return}
  log.innerHTML=myRecords.map((r,i)=>{
    const col=colorFor(r.name);
    const tag=r.end?'<span class="tag" style="background:'+col+'22;color:'+col+'">'+minStr(r.durationMs)+'</span>':'<span class="tag" style="background:#fff3cd;color:#856404">진행중</span>';
    return '<tr><td style="font-weight:500">'+r.name+'</td><td style="color:var(--muted);font-size:12px">'+r.date+'</td><td style="color:var(--muted);font-size:12px">'+r.start+'</td><td style="color:var(--muted);font-size:12px">'+(r.end||'—')+'</td><td>'+tag+'</td><td><button class="del-btn" onclick="deleteRecord('+i+',\''+r.id+'\')">×</button></td></tr>';
  }).join('');
}
async function loadSideUsers(){
  const data=await api({action:'getUsers'});
  if(!data)return;
  const users=(data.users||[]).filter(u=>u.name!==myName);
  const el=document.getElementById('sideUserList');
  if(!users.length){el.innerHTML='<div style="color:var(--muted);font-size:12px;padding:4px 9px">아직 없음</div>';return}
  el.innerHTML=users.map(u=>{
    const idx=avIdx(u.name);
    return '<div class="user-item" onclick="showOtherView(\''+u.name+'\')"><div class="avatar" style="background:'+AV_BG[idx]+';color:'+AV_FG[idx]+'">'+initials(u.name)+'</div><div><div style="font-size:13px">'+u.name+'</div><div style="font-size:10px;color:var(--muted)">'+(u.todayMs?minStr(u.todayMs):'오늘 기록 없음')+'</div></div></div>';
  }).join('');
}
function showMyView(){
  document.getElementById('myView').style.display='block';
  document.getElementById('otherView').style.display='none';
  document.getElementById('myUserItem').classList.add('active');
  document.querySelectorAll('#sideUserList .user-item').forEach(el=>el.classList.remove('active'));
}
async function showOtherView(name){
  document.getElementById('myView').style.display='none';
  document.getElementById('otherView').style.display='block';
  document.getElementById('myUserItem').classList.remove('active');
  document.getElementById('otherTitle').textContent=name+'의 트래커';
  document.getElementById('oBars').innerHTML='<div class="empty">불러오는 중...</div>';
  document.getElementById('otherLog').innerHTML='<tr><td colspan="5" class="empty">불러오는 중...</td></tr>';
  const data=await api({action:'getRecords',user:name});
  if(!data){document.getElementById('otherLog').innerHTML='<tr><td colspan="5" class="empty">데이터를 불러올 수 없습니다.</td></tr>';return}
  const recs=(data.records||[]).map(r=>({name:r.task,date:r.date,start:r.start,end:r.end||null,durationMs:Number(r.duration_ms)||0}));
  const done=recs.filter(r=>r.date===today()&&r.end);
  const totalMs=done.reduce((s,r)=>s+r.durationMs,0);
  document.getElementById('oMt').textContent=done.length?minStr(totalMs):'—';
  document.getElementById('oMc').textContent=done.length?done.length+'개':'—';
  const byTask={};
  done.forEach(r=>{byTask[r.name]=(byTask[r.name]||0)+r.durationMs});
  const sorted=Object.entries(byTask).sort((a,b)=>b[1]-a[1]);
  document.getElementById('oMx').textContent=sorted.length?sorted[0][0]:'—';
  const bars=document.getElementById('oBars');
  if(!sorted.length){bars.innerHTML='<div class="empty">오늘 기록이 없습니다.</div>';}
  else{const max=sorted[0][1];bars.innerHTML=sorted.map(([n,ms])=>'<div class="bar-row"><div class="bl" title="'+n+'">'+n+'</div><div class="bw"><div class="bf" style="width:'+Math.round(ms/max*100)+'%;background:'+colorFor(n)+'"></div></div><div class="bt">'+minStr(ms)+'</div></div>').join('')}
  document.getElementById('otherLog').innerHTML=recs.length?recs.map(r=>{const col=colorFor(r.name);return'<tr><td style="font-weight:500">'+r.name+'</td><td style="color:var(--muted);font-size:12px">'+r.date+'</td><td style="color:var(--muted);font-size:12px">'+r.start+'</td><td style="color:var(--muted);font-size:12px">'+(r.end||'—')+'</td><td>'+(r.end?'<span class="tag" style="background:'+col+'22;color:'+col+'">'+minStr(r.durationMs)+'</span>':'진행중')+'</td></tr>'}).join(''):'<tr><td colspan="5" class="empty">기록이 없습니다.</td></tr>';
}
document.addEventListener('DOMContentLoaded',()=>{
  document.getElementById('nameInput').addEventListener('keydown',e=>{
    if(e.key==='Enter'){e.preventDefault();login();}
  });
  document.getElementById('ti').addEventListener('keydown',e=>{
    if(e.key==='Enter'){e.preventDefault();if(!current)startTask();else stopTask();}
  });
  const saved=localStorage.getItem('tt_name');
  if(saved){document.getElementById('nameInput').value=saved;login();}
});
</script>
</body>
</html>
